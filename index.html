<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ST07415">
  <meta name="theme-color" content="#E8706A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <title>ST07415</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══ HOME PAGE ═══ -->
  <div id="page-home" class="page active">
    <div class="header">
      <p class="header__greeting" id="greeting-text"></p>
      <h1 class="header__title">今天想吃<em>什么</em>？</h1>
    </div>

    <div class="random-banner" id="btn-random">
      <div class="random-banner__text">
        <h3>不知道吃什么？</h3>
        <p>让我来帮你选</p>
      </div>
      <div class="random-banner__icon">🎲</div>
    </div>

    <div class="section">
      <div class="section__header">
        <h2 class="section__title">选个分类</h2>
      </div>
      <div class="category-grid" id="category-grid"></div>
    </div>
  </div>

  <!-- ═══ CATEGORY PAGE ═══ -->
  <div id="page-category" class="page">
    <div class="sub-header">
      <button class="back-btn" id="btn-back-cat">
        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <span class="sub-header__icon" id="cat-icon"></span>
      <h2 class="sub-header__title" id="cat-title"></h2>
    </div>
    <div class="section">
      <div class="dish-list" id="dish-list"></div>
      <div class="empty" id="dish-empty" style="display:none">
        <div class="empty__icon">🍽️</div>
        <h3 class="empty__title">还没有菜品</h3>
        <p class="empty__desc">去管理页面添加你喜欢的菜吧</p>
        <button class="btn-primary" onclick="navigateTo('manage')">去添加</button>
      </div>
    </div>
  </div>

  <!-- ═══ CART PAGE ═══ -->
  <div id="page-cart" class="page">
    <div class="sub-header">
      <h2 class="sub-header__title">点餐车</h2>
    </div>
    <div class="section">
      <div class="dish-list" id="cart-list"></div>
      <div class="empty" id="cart-empty" style="display:none">
        <div class="empty__icon">🛒</div>
        <h3 class="empty__title">还没选菜呢</h3>
        <p class="empty__desc">去首页挑点好吃的吧</p>
        <button class="btn-primary" onclick="navigateTo('home')">去选菜</button>
      </div>
    </div>
  </div>

  <!-- Confirm bar (shown when cart has items) -->
  <div class="confirm-bar" id="confirm-bar" style="display:none">
    <div class="confirm-bar__info">
      <span class="confirm-bar__label">已选</span>
      <span class="confirm-bar__count" id="confirm-count">0 道菜</span>
    </div>
    <button class="confirm-bar__btn" id="btn-confirm">确认下单</button>
  </div>

  <!-- ═══ HISTORY PAGE ═══ -->
  <div id="page-history" class="page">
    <div class="sub-header">
      <h2 class="sub-header__title">历史记录</h2>
    </div>
    <div class="section" id="order-list"></div>
    <div class="empty" id="order-empty" style="display:none">
      <div class="empty__icon">📋</div>
      <h3 class="empty__title">还没有订单</h3>
      <p class="empty__desc">下单后这里会记录你的美食足迹</p>
    </div>
  </div>

  <!-- ═══ MANAGE PAGE ═══ -->
  <div id="page-manage" class="page">
    <div class="manage-header">
      <h2 class="manage-header__title">菜品管理</h2>
    </div>

    <div class="manage-tabs" id="manage-tabs"></div>

    <div class="add-form" id="add-form">
      <div class="add-form__photo-row">
        <div class="photo-upload" id="photo-upload">
          <input type="file" id="input-photo" accept="image/*" capture="environment" hidden>
          <div class="photo-upload__preview" id="photo-preview">
            <svg class="photo-upload__icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <span>添加照片</span>
          </div>
          <img class="photo-upload__img" id="photo-img" style="display:none">
          <button class="photo-upload__remove" id="photo-remove" style="display:none">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      <div class="add-form__row">
        <input class="add-form__input" id="input-dish-name" placeholder="菜名" maxlength="20">
        <input class="add-form__input" id="input-dish-note" placeholder="备注（可选）" maxlength="30">
      </div>
      <button class="add-form__btn" id="btn-add-dish">添加菜品</button>
    </div>

    <div class="section">
      <div class="dish-list" id="manage-dish-list"></div>
      <div class="empty" id="manage-empty" style="display:none">
        <div class="empty__icon">✨</div>
        <h3 class="empty__title">这个分类还没有菜</h3>
        <p class="empty__desc">在上方输入菜名添加</p>
      </div>
    </div>
  </div>

  <!-- ═══ RANDOM RESULT MODAL ═══ -->
  <div class="modal-overlay" id="modal" style="display:none">
    <div class="modal">
      <img class="modal__photo" id="modal-photo" style="display:none" alt="">
      <div class="modal__emoji" id="modal-emoji"></div>
      <h2 class="modal__title" id="modal-title"></h2>
      <p class="modal__subtitle" id="modal-subtitle"></p>
      <div class="modal__actions">
        <button class="modal__btn modal__btn--primary" id="modal-add">加入点餐车</button>
        <button class="modal__btn modal__btn--secondary" id="modal-reroll">换一个</button>
        <button class="modal__btn modal__btn--secondary" id="modal-close">算了</button>
      </div>
    </div>
  </div>

  <!-- ═══ TOAST ═══ -->
  <div class="toast" id="toast"></div>

  <!-- ═══ BOTTOM NAV ═══ -->
  <nav class="nav">
    <button class="nav__item active" data-page="home">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>首页</span>
    </button>
    <button class="nav__item" data-page="cart">
      <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span>点餐车</span>
    </button>
    <button class="nav__item" data-page="history">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>历史</span>
    </button>
    <button class="nav__item" data-page="manage">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>管理</span>
    </button>
  </nav>

  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
